repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      # lint (check-only to avoid stash conflicts with unstaged changes)
      - id: ruff
        types_or: [ python ]
        language: python
        args: [ --no-fix ]
      # format (check-only)
      - id: ruff-format
        types_or: [ python ]
        args: [ --check ]

  - repo: local
    hooks:
      - id: ty-check
        name: ty type check
        entry: uvx ty@latest check yapit/gateway/
        language: system
        files: ^yapit/gateway/
        types_or: [python]
        pass_filenames: false
      - id: frontend-build
        name: frontend build
        entry: bash -c 'cd frontend && npm run build'
        language: system
        files: ^frontend/
        types_or: [ts, tsx]
        pass_filenames: false
