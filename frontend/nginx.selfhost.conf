upstream gateway {
    server gateway:8000;
    keepalive 64;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Docker DNS — allows lazy resolution for optional services (Stack Auth)
    resolver 127.0.0.11 valid=10s;

    client_max_body_size 256M;

    # WebSocket proxy
    location /api/v1/ws/ {
        proxy_pass http://gateway/v1/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # HTTP API proxy
    location /api/ {
        proxy_pass http://gateway/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
    }

    # Stack Auth API proxy (resolved at request time — 502s if not running)
    location /auth/api/ {
        set $stack_auth_api stack-auth:8102;
        proxy_pass http://$stack_auth_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # Stack Auth Dashboard proxy
    location /auth/ {
        set $stack_auth_dashboard stack-auth:8101;
        proxy_pass http://$stack_auth_dashboard/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # Markdown export
    location ~ ^/listen/([^/]+)/(md|md-annotated)$ {
        rewrite ^/listen/([^/]+)/(md|md-annotated)$ /api/v1/documents/$1/$2 last;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
