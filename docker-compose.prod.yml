volumes:
  pgdata:
  audio_cache:
  document_cache:
  extraction_cache:
  gateway-data:
  metricsdata:
  markxiv-cache:
  clickhouse-data:

networks:
  yapit-network:
    external: true

services:
  frontend:
    init: true
    image: ghcr.io/yapit-tts/frontend:latest
    cap_drop: [ALL]
    networks:
      - yapit-network
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.yapit-frontend.rule=Host(`yapit.md`)"
        - "traefik.http.routers.yapit-frontend.entrypoints=websecure"
        - "traefik.http.routers.yapit-frontend.tls=true"
        - "traefik.http.services.yapit-frontend.loadbalancer.server.port=8080"

  postgres:
    init: true
    image: postgres:16-alpine
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID, KILL]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - yapit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-yapit}"]
      start_period: 30s
      start_interval: 1s
      interval: 30s
      timeout: 3s
      retries: 10
    deploy:
      replicas: 1
      update_config:
        order: stop-first  # Stateful - stop old before starting new

  redis:
    init: true
    image: redis:7-alpine
    user: redis
    cap_drop: [ALL]
    ports:
      - target: 6379
        published: 6379
        protocol: tcp
        mode: host  # Bypass Swarm ingress; binds to 0.0.0.0 on this node only
    # Security: Swarm cannot bind to specific IPs. External access blocked by
    # Hetzner firewall + UFW. Tailscale workers connect via VPN (bypasses UFW).
    networks:
      - yapit-network
    deploy:
      replicas: 1
      update_config:
        order: stop-first

  smokescreen:
    init: true
    image: ghcr.io/yapit-tts/smokescreen:latest
    cap_drop: [ALL]
    networks:
      - yapit-network
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback

  metrics-db:
    init: true
    image: timescale/timescaledb:latest-pg16
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID, KILL]
    environment:
      POSTGRES_USER: ${METRICS_DB_USER}
      POSTGRES_PASSWORD: ${METRICS_DB_PASSWORD}
      POSTGRES_DB: metrics
    volumes:
      - metricsdata:/var/lib/postgresql/data
      - ./docker/metrics-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - yapit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${METRICS_DB_USER:-metrics}"]
      start_period: 30s
      start_interval: 1s
      interval: 30s
      timeout: 3s
      retries: 10
    deploy:
      replicas: 1
      update_config:
        order: stop-first

  gateway:
    init: true
    image: ghcr.io/yapit-tts/gateway:latest
    cap_drop: [ALL]
    env_file:
      - ./.env
      - ./.env.prod
    volumes:
      - audio_cache:/data/audio_cache
      - document_cache:/data/document_cache
      - extraction_cache:/data/extraction_cache
      - gateway-data:/data/gateway
    networks:
      - yapit-network
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      start_period: 80s
      start_interval: 1s
      interval: 30s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback

  clickhouse:
    init: true
    image: clickhouse/clickhouse-server:25.10-alpine
    cap_drop: [ALL]
    cap_add: [SYS_NICE, NET_BIND_SERVICE, CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID, KILL]
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: stackframe
      CLICKHOUSE_PASSWORD: clickhouse-prod
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - yapit-network
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      start_period: 10s
      start_interval: 1s
      interval: 30s
      timeout: 3s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        order: stop-first

  stack-auth:
    init: true
    image: ghcr.io/yapit-tts/stack-auth:latest
    cap_drop: [ALL]
    env_file:
      - ./.env
      - ./.env.prod
    networks:
      - yapit-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8101/health && curl -fs http://localhost:8102/health"]
      start_period: 80s
      start_interval: 1s
      interval: 30s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        # API router (higher priority, matches /api paths)
        - "traefik.http.routers.stack-auth-api.rule=Host(`auth.yapit.md`) && PathPrefix(`/api`)"
        - "traefik.http.routers.stack-auth-api.entrypoints=websecure"
        - "traefik.http.routers.stack-auth-api.tls=true"
        - "traefik.http.routers.stack-auth-api.priority=20"
        - "traefik.http.routers.stack-auth-api.service=stack-auth-api"
        - "traefik.http.services.stack-auth-api.loadbalancer.server.port=8102"
        # Dashboard router (lower priority, catches everything else)
        - "traefik.http.routers.stack-auth-dashboard.rule=Host(`auth.yapit.md`)"
        - "traefik.http.routers.stack-auth-dashboard.entrypoints=websecure"
        - "traefik.http.routers.stack-auth-dashboard.tls=true"
        - "traefik.http.routers.stack-auth-dashboard.priority=10"
        - "traefik.http.routers.stack-auth-dashboard.service=stack-auth-dashboard"
        - "traefik.http.services.stack-auth-dashboard.loadbalancer.server.port=8101"

  markxiv:
    init: true
    image: ghcr.io/yapit-tts/markxiv:latest
    cap_drop: [ALL]
    environment:
      PORT: "8080"
      MARKXIV_CACHE_CAP: "500"
      MARKXIV_DISK_CACHE_CAP_BYTES: "10737418240"  # 10GB
      MARKXIV_CACHE_DIR: /cache
    volumes:
      - markxiv-cache:/cache
    networks:
      - yapit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      start_period: 10s
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback

  kokoro-cpu:
    init: true
    image: ghcr.io/yapit-tts/kokoro-cpu:latest
    command: python -m yapit.workers.kokoro
    cap_drop: [ALL]
    environment:
      REDIS_URL: redis://redis:6379
      WORKER_ID: swarm-kokoro-cpu-{{.Task.Slot}}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS}
    networks:
      - yapit-network
    deploy:
      replicas: ${KOKORO_CPU_REPLICAS}
      update_config:
        order: start-first
        failure_action: rollback

  yolo-cpu:
    init: true
    image: ghcr.io/yapit-tts/yolo-cpu:latest
    command: python -m yapit.workers.yolo
    cap_drop: [ALL]
    environment:
      REDIS_URL: redis://redis:6379
      WORKER_ID: swarm-yolo-cpu-{{.Task.Slot}}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS}
    networks:
      - yapit-network
    deploy:
      replicas: ${YOLO_CPU_REPLICAS}
      update_config:
        order: start-first
        failure_action: rollback
