# External worker compose file - connect GPU/CPU machines via Tailscale
#
# Prerequisites: Docker 25+ with CDI enabled, nvidia-container-toolkit, Tailscale connected, REDIS_URL set
#
# GPU setup (one-time):
#   sudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml
#   Add {"features": {"cdi": true}} to /etc/docker/daemon.json, restart dockerd
#   (NixOS: hardware.nvidia-container-toolkit.enable + virtualisation.docker.daemon.settings.features.cdi handle this)
#
# MPS (optional, one-time): sudo nvidia-cuda-mps-control -d
#
# Start: docker compose -f docker-compose.worker.yml up -d --scale kokoro-gpu=2 --scale yolo-gpu=2 --scale kokoro-cpu=1 --scale yolo-cpu=1
# Stop:  docker compose -f docker-compose.worker.yml down
# Logs:  docker compose -f docker-compose.worker.yml logs -f

services:
  kokoro-gpu:
    init: true
    image: ghcr.io/yapit-tts/kokoro-gpu:latest
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    ipc: host
    environment:
      REDIS_URL: ${REDIS_URL}
      WORKER_ID: ${HOSTNAME:-worker}-kokoro-gpu
      DEVICE: cuda
      CUDA_MPS_PIPE_DIRECTORY: /tmp/nvidia-mps
    volumes:
      - /tmp/nvidia-mps:/tmp/nvidia-mps
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              capabilities: [gpu]
              device_ids:
                - nvidia.com/gpu=all
    restart: unless-stopped

  kokoro-cpu:
    init: true
    image: ghcr.io/yapit-tts/kokoro-cpu:latest
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      REDIS_URL: ${REDIS_URL}
      WORKER_ID: ${HOSTNAME:-worker}-kokoro-cpu
      DEVICE: cpu
      OMP_NUM_THREADS: "2"
    restart: unless-stopped

  yolo-gpu:
    init: true
    image: ghcr.io/yapit-tts/yolo-gpu:latest
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    ipc: host
    environment:
      REDIS_URL: ${REDIS_URL}
      WORKER_ID: ${HOSTNAME:-worker}-yolo-gpu
      DEVICE: cuda
      CUDA_MPS_PIPE_DIRECTORY: /tmp/nvidia-mps
    volumes:
      - /tmp/nvidia-mps:/tmp/nvidia-mps
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              capabilities: [gpu]
              device_ids:
                - nvidia.com/gpu=all
    restart: unless-stopped

  yolo-cpu:
    init: true
    image: ghcr.io/yapit-tts/yolo-cpu:latest
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      REDIS_URL: ${REDIS_URL}
      WORKER_ID: ${HOSTNAME:-worker}-yolo-cpu
      DEVICE: cpu
      OMP_NUM_THREADS: "2"
    restart: unless-stopped
